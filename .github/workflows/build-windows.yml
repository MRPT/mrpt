  #           -DDISABLE_ASSIMP=ON); a real installer needs wxWidgets/Qt provided
  #           via vcpkg (eigen3 zlib zstd tinyxml2 gtest cli11 pybind11 + wxwidgets qt5).
  #   - TODO: Rename the artifact to `mrpt-release-<tag>.exe` (was PKG_NAME logic).
