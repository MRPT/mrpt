name: CI Windows

on: [push, pull_request]

jobs:
  build:
    name: ${{ matrix.name }} ${{ matrix.build_type }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120

    env:
      CTEST_OUTPUT_ON_FAILURE: ON
      COLCON_HOME: ${{ github.workspace }}/.colcon
      SCCACHE_GHA_ENABLED: "true"
      VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

    strategy:
      fail-fast: false
      matrix:
        name: [windows-2025-msvc]
        build_type: [Release]
        include:
          - name: windows-2025-msvc
            os: windows-2025
            compiler: cl

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Git submodule
        run: |
          git submodule sync
          git submodule update --init --recursive

      - name: Expose GitHub Actions cache to vcpkg
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Set up MSVC developer environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install vcpkg dependencies
        shell: bash
        run: |
          vcpkg install eigen3 zlib zstd tinyxml2 gtest cli11 pybind11 --triplet x64-windows
          echo "CMAKE_TOOLCHAIN_FILE=$VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" >> $GITHUB_ENV
          echo "VCPKG_TARGET_TRIPLET=x64-windows" >> $GITHUB_ENV

      - name: Install colcon
        shell: bash
        run: |
          pip install colcon-common-extensions numpy

      - name: Colcon Build
        shell: bash
        run: |
          colcon build \
            --event-handlers console_direct+ \
            --cmake-args \
              -G Ninja \
              -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
              -DCMAKE_VERBOSE_MAKEFILE=ON \
              -DMRPT_BUILD_TESTING=ON \
              -DDISABLE_WXWIDGETS=ON \
              -DMRPT_WITH_QT=OFF \
              -DDISABLE_ASSIMP=ON \
              -DMRPT_WITH_NANOGUI=OFF \
              "-DCMAKE_TOOLCHAIN_FILE=$CMAKE_TOOLCHAIN_FILE" \
              "-DVCPKG_TARGET_TRIPLET=$VCPKG_TARGET_TRIPLET" \
              -DCMAKE_C_COMPILER_LAUNCHER=sccache \
              -DCMAKE_CXX_COMPILER_LAUNCHER=sccache

      - name: Colcon Test
        shell: bash
        run: |
          colcon test \
            --event-handlers console_direct+ \
            --return-code-on-test-failure

  # ---------------------------------------------------------------------------
  # Windows installer packaging — RELEASES ONLY (tag pushes).
  # Replaces the old AppVeyor pipeline (removed). Builds the NSIS installer and
  # attaches it to the GitHub Release for the pushed tag.
