name: CI Windows

on: [push, pull_request]

jobs:
  build:
    name: ${{ matrix.name }} ${{ matrix.build_type }}
    runs-on: ${{ matrix.os }}

    env:
      CTEST_OUTPUT_ON_FAILURE: ON
      COLCON_HOME: ${{ github.workspace }}/.colcon

    strategy:
      fail-fast: false
      matrix:
        name: [windows-latest-msvc]
        build_type: [Release]
        include:
          - name: windows-latest-msvc
            os: windows-latest
            compiler: cl

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Git submodule
        run: |
          git submodule sync
          git submodule update --init --recursive

      - name: Set up MSVC developer environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install vcpkg dependencies
        shell: bash
        run: |
          # vcpkg is pre-installed on GitHub-hosted Windows runners
          vcpkg install eigen3 zlib zstd tinyxml2 --triplet x64-windows
          echo "CMAKE_TOOLCHAIN_FILE=$VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" >> $GITHUB_ENV
          echo "VCPKG_TARGET_TRIPLET=x64-windows" >> $GITHUB_ENV

      - name: Install colcon
        shell: bash
        run: |
          pip install colcon-common-extensions numpy

      - name: Colcon Build
        shell: bash
        run: |
          colcon build \
            --event-handlers console_direct+ \
            --cmake-args \
              -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
              -DCMAKE_VERBOSE_MAKEFILE=ON \
              -DMRPT_BUILD_TESTING=ON \
              -DDISABLE_WXWIDGETS=ON \
              -DMRPT_WITH_QT=OFF \
              -DDISABLE_ASSIMP=ON \
              "-DCMAKE_TOOLCHAIN_FILE=$CMAKE_TOOLCHAIN_FILE" \
              "-DVCPKG_TARGET_TRIPLET=$VCPKG_TARGET_TRIPLET"

      - name: Colcon Test
        shell: bash
        run: |
          colcon test \
            --event-handlers console_direct+ \
            --return-code-on-test-failure
